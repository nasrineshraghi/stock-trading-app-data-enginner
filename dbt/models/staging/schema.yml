version: 2

models:
  - name: stg_stock_ohlcv
    description: Cleaned OHLCV from raw Snowflake table (uppercase ticker, canonical names)
    columns:
      - name: ticker
        description: Stock symbol
        tests:
          - not_null
      - name: date
        description: Trading date
        tests:
          - not_null
      - name: close
        description: Closing price
        tests:
          - not_null
