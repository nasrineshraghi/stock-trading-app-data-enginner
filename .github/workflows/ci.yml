name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Unit & integration tests
        run: pytest tests/ --cov=stock_pipeline --cov-report=term-missing

  pipeline-dry-run:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Validate sample CSV through quality framework
        run: |
          python - <<'PY'
          from datetime import date
          from pathlib import Path
          import pandas as pd
          from stock_pipeline.load.csv_exporter import export_dataframe
          from stock_pipeline.quality import assert_ohlcv_quality

          df = pd.DataFrame({
              "ticker": ["AAPL"],
              "date": pd.to_datetime(["2024-01-02"]),
              "open": [150.0],
              "high": [152.0],
              "low": [149.5],
              "close": [151.0],
              "volume": [1_000_000.0],
              "vwap": [150.25],
              "transactions": [50_000],
              "source": ["polygon.io"],
              "ingested_at": ["2024-06-01T00:00:00+00:00"],
          })
          path = Path("data/processed/CI_SAMPLE.csv")
          export_dataframe(df, path)
          assert_ohlcv_quality(df)
          print(f"Quality validation passed for {path}")
          PY

      - name: CLI validate command
        run: stock-ingest validate data/processed/CI_SAMPLE.csv
